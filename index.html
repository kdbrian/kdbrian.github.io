<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-300 via-zinc-200 to-slate-400">

<div class="w-[95%] h-[90vh] rounded-3xl border border-zinc-400 bg-white/30 backdrop-blur-md flex p-10 gap-10 overflow-hidden">

<div class="w-1/4 flex flex-col items-center gap-6 border-r border-zinc-400 pr-8">
<img src="profile.jpg" class="w-48 h-48 rounded-full object-cover border-4 border-white shadow-xl">
<div class="text-center">
<h2 class="text-2xl font-semibold tracking-wide">Alex Carter</h2>
<p class="text-zinc-700">Frontend Developer</p>
<p class="text-zinc-600 text-sm">Age: 25</p>
<p class="text-zinc-600 text-sm">Sex: Male</p>
</div>
<div class="flex gap-4 mt-4">
<a href="#" class="px-4 py-2 rounded-full bg-black text-white hover:scale-110 transition">GitHub</a>
<a href="#" class="px-4 py-2 rounded-full bg-green-600 text-white hover:scale-110 transition">Linktree</a>
</div>
</div>

<div class="w-2/4 flex flex-col items-center justify-center relative overflow-hidden">
<h1 id="projectTitle" class="text-6xl wobble mb-6 text-center transition-all duration-500"></h1>
<div id="stack" class="relative w-80 h-[420px]"></div>
</div>

<div class="w-1/4 flex items-center justify-center">
<div id="preview" class="w-72 h-[420px] rounded-2xl shadow-2xl bg-cover bg-center transition-all duration-700 cursor-pointer"></div>
</div>

</div>

<script>
const projects = [
"project-one",
"project-two",
"project-three"
]

let index = 0
let projectData = []
const stack = document.getElementById("stack")
const preview = document.getElementById("preview")
const title = document.getElementById("projectTitle")

async function loadProjects(){
for(const name of projects){
const res = await fetch(`projects/${name}/project.json`)
const data = await res.json()
projectData.push(data)
}
render()
}

function render(){
stack.innerHTML=""
const current = projectData[index]
title.textContent = current.title

current.images.forEach((img, i)=>{
const card = document.createElement("div")
card.className="absolute w-full h-full rounded-2xl shadow-2xl bg-cover bg-center transition-all duration-700"
card.style.backgroundImage=`url(projects/${current.slug}/art/${img})`
card.style.zIndex = current.images.length - i
card.style.transform = `translateY(${i*12}px) scale(${1 - i*0.05})`
card.style.opacity = i === 0 ? 1 : 0.5
card.style.filter = i === 0 ? "blur(0px)" : "blur(2px)"
stack.appendChild(card)
})

updatePreview()
}

function updatePreview(){
const next = projectData[(index+1)%projectData.length]
preview.style.opacity=0
setTimeout(()=>{
preview.style.backgroundImage=`url(projects/${next.slug}/art/${next.images[0]})`
preview.style.opacity=1
},300)
}

function rotateProjects(){
index=(index+1)%projectData.length
title.classList.remove("animateTitle")
void title.offsetWidth
title.classList.add("animateTitle")
render()
}

preview.addEventListener("click",rotateProjects)
loadProjects()
</script>

</body>
</html>
